<!DOCTYPE html>
<html>
<head>
  <title>Google Satellite Map with Drawing</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', Arial, sans-serif;
    }
    #map {
      height: 100vh;
      width: 100%;
    }
    .coordinates-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      max-width: 350px;
      max-height: 85vh;
      overflow-y: auto;
      z-index: 5;
    }
    .coordinates-panel h3 {
      margin-top: 0;
      color: #1a73e8;
      border-bottom: 2px solid #1a73e8;
      padding-bottom: 8px;
    }
    .shape-item {
      background: #f8f9fa;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border-left: 4px solid #34a853;
    }
    .shape-type {
      font-weight: bold;
      color: #202124;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .coord-line {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #5f6368;
      margin: 4px 0;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 8px;
      margin-top: 8px;
      resize: vertical;
      box-sizing: border-box;
    }
    .btn {
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      margin: 5px 0;
      width: 100%;
      transition: background-color 0.2s;
    }
    .btn-export {
      background: #1a73e8;
      color: white;
    }
    .btn-export:hover {
      background: #1557b0;
    }
    .btn-clear {
      background: #ea4335;
      color: white;
    }
    .btn-clear:hover {
      background: #c5221f;
    }
    .instructions {
      background: #e8f0fe;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: #202124;
    }
    .instructions strong {
      color: #1a73e8;
    }
  </style>
</head>
<body>

  <!-- Google Maps API with Drawing and Geometry libraries -->
  <!-- <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAE5DwEfbfyyOSmwlomkRx1qQqyvAsS0z4&libraries=drawing,geometry&callback=initMap" async defer></script> -->
</body>
</html>
